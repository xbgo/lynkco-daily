name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m py_compile lynkco_paths.py lynkco_daily.py lynkco_auto.py lynkco_gui.py qinglong/lynkco_ql.py

      - name: Secret guard
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'bearer[a-zA-Z0-9-]{20,}|LYNKCO_CA_SECRET=.+|LYNKCO_(REFRESH_TOKEN|TOKEN)=bearer[a-zA-Z0-9-]{20,}' \
            --exclude-dir=.git --exclude-dir=.github --exclude='.env.example' --exclude='README.md' --exclude='qinglong/README.md' .; then
            echo "疑似敏感信息，请确认后再打包。" >&2
            exit 1
          fi

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Write built-in signature config
        shell: pwsh
        env:
          LYNKCO_APP_CODE: ${{ secrets.LYNKCO_APP_CODE }}
          LYNKCO_CA_KEY: ${{ secrets.LYNKCO_CA_KEY }}
          LYNKCO_CA_SECRET: ${{ secrets.LYNKCO_CA_SECRET }}
        run: |
          @'
          from pathlib import Path
          import os
          from pprint import pformat

          values = {
              "LYNKCO_APP_CODE": os.getenv("LYNKCO_APP_CODE", ""),
              "LYNKCO_CA_KEY": os.getenv("LYNKCO_CA_KEY", ""),
              "LYNKCO_CA_SECRET": os.getenv("LYNKCO_CA_SECRET", ""),
          }
          Path("lynkco_private.py").write_text("SECRETS = " + pformat(values) + "\n", encoding="utf-8")
          '@ | python -

      - name: Build Windows exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name LynkcoDaily `
            --icon assets/apk.ico `
            --collect-data customtkinter `
            --hidden-import lynkco_private `
            --hidden-import lynkco_auto `
            --hidden-import lynkco_daily `
            --hidden-import lynkco_paths `
            --add-data ".env.example;." `
            --add-data "assets/zsm.png;assets" `
            lynkco_gui.py
          New-Item -ItemType Directory -Force -Path package | Out-Null
          New-Item -ItemType Directory -Force -Path package\assets | Out-Null
          Copy-Item dist\LynkcoDaily.exe package\LynkcoDaily.exe
          Copy-Item README.md package\
          Copy-Item DISCLAIMER.md package\
          Copy-Item LICENSE package\
          Copy-Item assets\zsm.png package\assets\zsm.png
          Copy-Item assets\apk.ico package\assets\apk.ico
          Compress-Archive -Path package\* -DestinationPath dist\LynkcoDaily-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LynkcoDaily-Windows
          path: dist/LynkcoDaily-Windows.zip

  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Write built-in signature config
        shell: bash
        env:
          LYNKCO_APP_CODE: ${{ secrets.LYNKCO_APP_CODE }}
          LYNKCO_CA_KEY: ${{ secrets.LYNKCO_CA_KEY }}
          LYNKCO_CA_SECRET: ${{ secrets.LYNKCO_CA_SECRET }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          from pprint import pformat

          values = {
              "LYNKCO_APP_CODE": os.getenv("LYNKCO_APP_CODE", ""),
              "LYNKCO_CA_KEY": os.getenv("LYNKCO_CA_KEY", ""),
              "LYNKCO_CA_SECRET": os.getenv("LYNKCO_CA_SECRET", ""),
          }
          Path("lynkco_private.py").write_text("SECRETS = " + pformat(values) + "\n", encoding="utf-8")
          PY

      - name: Build macOS app and dmg
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path("assets/apk.ico")
          iconset = Path("build/apk.iconset")
          iconset.mkdir(parents=True, exist_ok=True)

          image = Image.open(source)
          ico = getattr(image, "ico", None)
          if ico is not None and ico.sizes():
              size = max(ico.sizes(), key=lambda item: item[0] * item[1])
              image = ico.getimage(size)
          image = image.convert("RGBA")

          targets = {
              "icon_16x16.png": 16,
              "icon_16x16@2x.png": 32,
              "icon_32x32.png": 32,
              "icon_32x32@2x.png": 64,
              "icon_128x128.png": 128,
              "icon_128x128@2x.png": 256,
              "icon_256x256.png": 256,
              "icon_256x256@2x.png": 512,
              "icon_512x512.png": 512,
              "icon_512x512@2x.png": 1024,
          }
          for name, size in targets.items():
              image.resize((size, size), Image.LANCZOS).save(iconset / name)
          PY
          iconutil -c icns build/apk.iconset -o assets/apk.icns
          pyinstaller --noconfirm --clean --windowed \
            --name LynkcoDaily \
            --icon assets/apk.icns \
            --collect-data customtkinter \
            --hidden-import lynkco_private \
            --hidden-import lynkco_auto \
            --hidden-import lynkco_daily \
            --hidden-import lynkco_paths \
            --add-data ".env.example:." \
            --add-data "assets/zsm.png:assets" \
            lynkco_gui.py
          mkdir -p dmg-root
          cp -R dist/LynkcoDaily.app dmg-root/
          cp README.md DISCLAIMER.md LICENSE dmg-root/
          mkdir -p dmg-root/assets
          cp assets/zsm.png dmg-root/assets/
          cp assets/apk.ico dmg-root/assets/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "LynkcoDaily" -srcfolder dmg-root -ov -format UDZO dist/LynkcoDaily-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: LynkcoDaily-macOS
          path: dist/LynkcoDaily-macOS.dmg

  build-source:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/lynkco-daily-source.zip HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynkco-daily-source
          path: dist/lynkco-daily-source.zip

  release:
    needs:
      - build-windows
      - build-macos
      - build-source
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-assets/windows release-assets/macos release-assets/source
          gh run download "$GITHUB_RUN_ID" --name LynkcoDaily-Windows --dir release-assets/windows
          gh run download "$GITHUB_RUN_ID" --name LynkcoDaily-macOS --dir release-assets/macos
          gh run download "$GITHUB_RUN_ID" --name lynkco-daily-source --dir release-assets/source
          find release-assets -maxdepth 3 -type f -print

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          cat > release-notes.md <<'EOF'
          领克每日任务桌面版发布包。

          下载说明：

          - Windows 用户下载 `LynkcoDaily-Windows.zip`，解压后运行 `LynkcoDaily.exe`
          - macOS 用户下载 `LynkcoDaily-macOS.dmg`，打开后把 App 拖到 Applications
          - 青龙面板或源码部署用户下载 `lynkco-daily-source.zip`

          本项目仅供学习交流使用，请勿用于商业用途。
          EOF

          assets=(
            "release-assets/windows/LynkcoDaily-Windows.zip"
            "release-assets/macos/LynkcoDaily-macOS.dmg"
            "release-assets/source/lynkco-daily-source.zip"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --notes-file release-notes.md
          fi
