name: Package

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "是否直接发布 GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "发布版本号，例如 v1.0.0。留空时只构建不发布"
        required: false
        type: string
      prerelease:
        description: "是否标记为预发布"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m py_compile lynkco_paths.py lynkco_daily.py lynkco_auto.py lynkco_gui.py qinglong/lynkco_ql.py

      - name: Secret guard
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'bearer[a-zA-Z0-9-]{20,}|LYNKCO_CA_SECRET=.+|LYNKCO_(REFRESH_TOKEN|TOKEN)=bearer[a-zA-Z0-9-]{20,}' \
            --exclude-dir=.git --exclude-dir=.github --exclude='.env.example' --exclude='README.md' --exclude='qinglong/README.md' .; then
            echo "疑似敏感信息，请确认后再打包。" >&2
            exit 1
          fi

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Write built-in signature config
        shell: pwsh
        env:
          LYNKCO_APP_CODE: ${{ secrets.LYNKCO_APP_CODE }}
          LYNKCO_CA_KEY: ${{ secrets.LYNKCO_CA_KEY }}
          LYNKCO_CA_SECRET: ${{ secrets.LYNKCO_CA_SECRET }}
        run: |
          @'
          from pathlib import Path
          import os
          from pprint import pformat

          values = {
              "LYNKCO_APP_CODE": os.getenv("LYNKCO_APP_CODE", ""),
              "LYNKCO_CA_KEY": os.getenv("LYNKCO_CA_KEY", ""),
              "LYNKCO_CA_SECRET": os.getenv("LYNKCO_CA_SECRET", ""),
          }
          Path("lynkco_private.py").write_text("SECRETS = " + pformat(values) + "\n", encoding="utf-8")
          '@ | python -

      - name: Build Windows exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name LynkcoDaily `
            --icon assets/apk.ico `
            --collect-data customtkinter `
            --hidden-import lynkco_private `
            --hidden-import lynkco_auto `
            --hidden-import lynkco_daily `
            --hidden-import lynkco_paths `
            --add-data ".env.example;." `
            --add-data "assets/zsm.png;assets" `
            lynkco_gui.py
          $Version = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -ne "tag") {
            $Version = "${{ inputs.release_tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($Version)) {
            $Version = "dev-${{ github.run_number }}"
          }
          $FileVersion = $Version.TrimStart("v")
          $SafeVersion = $FileVersion -replace '[^A-Za-z0-9._-]', '-'
          $PortableDir = "package\LynkcoDaily"
          New-Item -ItemType Directory -Force -Path "$PortableDir\assets" | Out-Null
          Copy-Item dist\LynkcoDaily.exe "$PortableDir\LynkcoDaily.exe"
          Copy-Item README.md "$PortableDir\README.md"
          Copy-Item DISCLAIMER.md "$PortableDir\DISCLAIMER.md"
          Copy-Item LICENSE "$PortableDir\LICENSE"
          Copy-Item assets\zsm.png "$PortableDir\assets\zsm.png"
          Copy-Item assets\apk.ico "$PortableDir\assets\apk.ico"
          Compress-Archive -Path "$PortableDir\*" -DestinationPath "dist\LynkcoDaily-$SafeVersion-windows-x64.zip" -Force

          $AppVersion = $FileVersion
          @"
          [Setup]
          AppId={{8F3A67D4-05E4-4CE5-8E52-973A2D41C3B4}
          AppName=LynkcoDaily
          AppVersion=$AppVersion
          AppPublisher=小八
          AppPublisherURL=https://xbcars.cn
          DefaultDirName={autopf}\LynkcoDaily
          DefaultGroupName=LynkcoDaily
          DisableProgramGroupPage=yes
          OutputDir=dist
          OutputBaseFilename=LynkcoDaily-$SafeVersion-windows-x64-setup
          SetupIconFile=assets\apk.ico
          UninstallDisplayIcon={app}\LynkcoDaily.exe
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern

          [Languages]
          Name: "chinesesimp"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"

          [Files]
          Source: "dist\LynkcoDaily.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "README.md"; DestDir: "{app}"; Flags: ignoreversion
          Source: "DISCLAIMER.md"; DestDir: "{app}"; Flags: ignoreversion
          Source: "LICENSE"; DestDir: "{app}"; Flags: ignoreversion
          Source: "assets\zsm.png"; DestDir: "{app}\assets"; Flags: ignoreversion
          Source: "assets\apk.ico"; DestDir: "{app}\assets"; Flags: ignoreversion

          [Icons]
          Name: "{group}\LynkcoDaily"; Filename: "{app}\LynkcoDaily.exe"
          Name: "{autodesktop}\LynkcoDaily"; Filename: "{app}\LynkcoDaily.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "附加选项："; Flags: unchecked

          [Run]
          Filename: "{app}\LynkcoDaily.exe"; Description: "运行 LynkcoDaily"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path installer.iss -Encoding UTF8

          $Iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $Iscc) {
            & $Iscc installer.iss
          } else {
            iscc installer.iss
          }

      - name: Upload Windows setup artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/LynkcoDaily-*-windows-x64-setup.exe
          archive: false
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/LynkcoDaily-*-windows-x64.zip
          archive: false
          if-no-files-found: error

  build-macos:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Write built-in signature config
        shell: bash
        env:
          LYNKCO_APP_CODE: ${{ secrets.LYNKCO_APP_CODE }}
          LYNKCO_CA_KEY: ${{ secrets.LYNKCO_CA_KEY }}
          LYNKCO_CA_SECRET: ${{ secrets.LYNKCO_CA_SECRET }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          from pprint import pformat

          values = {
              "LYNKCO_APP_CODE": os.getenv("LYNKCO_APP_CODE", ""),
              "LYNKCO_CA_KEY": os.getenv("LYNKCO_CA_KEY", ""),
              "LYNKCO_CA_SECRET": os.getenv("LYNKCO_CA_SECRET", ""),
          }
          Path("lynkco_private.py").write_text("SECRETS = " + pformat(values) + "\n", encoding="utf-8")
          PY

      - name: Build macOS app and dmg
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          source = Path("assets/apk.ico")
          iconset = Path("build/apk.iconset")
          iconset.mkdir(parents=True, exist_ok=True)

          image = Image.open(source)
          ico = getattr(image, "ico", None)
          if ico is not None and ico.sizes():
              size = max(ico.sizes(), key=lambda item: item[0] * item[1])
              image = ico.getimage(size)
          image = image.convert("RGBA")

          targets = {
              "icon_16x16.png": 16,
              "icon_16x16@2x.png": 32,
              "icon_32x32.png": 32,
              "icon_32x32@2x.png": 64,
              "icon_128x128.png": 128,
              "icon_128x128@2x.png": 256,
              "icon_256x256.png": 256,
              "icon_256x256@2x.png": 512,
              "icon_512x512.png": 512,
              "icon_512x512@2x.png": 1024,
          }
          for name, size in targets.items():
              image.resize((size, size), Image.LANCZOS).save(iconset / name)
          PY
          iconutil -c icns build/apk.iconset -o assets/apk.icns
          pyinstaller --noconfirm --clean --windowed \
            --name LynkcoDaily \
            --icon assets/apk.icns \
            --collect-data customtkinter \
            --hidden-import lynkco_private \
            --hidden-import lynkco_auto \
            --hidden-import lynkco_daily \
            --hidden-import lynkco_paths \
            --add-data ".env.example:." \
            --add-data "assets/zsm.png:assets" \
            lynkco_gui.py
          mkdir -p dmg-root
          cp -R dist/LynkcoDaily.app dmg-root/
          cp README.md DISCLAIMER.md LICENSE dmg-root/
          mkdir -p dmg-root/assets
          cp assets/zsm.png dmg-root/assets/
          cp assets/apk.ico dmg-root/assets/
          ln -s /Applications dmg-root/Applications
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="${{ inputs.release_tag }}"
          fi
          if [[ -z "${version}" ]]; then
            version="dev-${GITHUB_RUN_NUMBER}"
          fi
          file_version="${version#v}"
          safe_version="$(echo "${file_version}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          os_arch="${{ matrix.arch }}"
          hdiutil create -volname "LynkcoDaily" -srcfolder dmg-root -ov -format UDZO "dist/LynkcoDaily-${safe_version}-macos-${os_arch}.dmg"
          (cd dist && ditto -c -k --sequesterRsrc --keepParent LynkcoDaily.app "LynkcoDaily-${safe_version}-macos-${os_arch}.zip")

      - name: Upload macOS dmg artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/LynkcoDaily-*-macos-*.dmg
          archive: false
          if-no-files-found: error

      - name: Upload macOS app zip artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/LynkcoDaily-*-macos-*.zip
          archive: false
          if-no-files-found: error

  checksums:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Generate checksums
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          cd release-assets
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="${RELEASE_TAG}"
          fi
          if [[ -z "${version}" ]]; then
            version="dev-${GITHUB_RUN_NUMBER}"
          fi
          sha256sum LynkcoDaily-*.exe LynkcoDaily-*.dmg LynkcoDaily-*.zip > SHA256SUMS.txt
          md5sum LynkcoDaily-*.exe LynkcoDaily-*.dmg LynkcoDaily-*.zip > MD5SUMS.txt
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json
          import os

          version = os.environ.get("GITHUB_REF_NAME", "")
          if os.environ.get("GITHUB_REF_TYPE") != "tag":
              version = os.environ.get("RELEASE_TAG", "")
          if not version:
              version = f"dev-{os.environ['GITHUB_RUN_NUMBER']}"

          repo = os.environ["GITHUB_REPOSITORY"]
          base = f"https://github.com/{repo}/releases/download/{version}"
          files = sorted(path.name for path in Path(".").glob("LynkcoDaily-*"))
          payload = {
              "version": version,
              "pub_date": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "files": [{"name": name, "url": f"{base}/{name}"} for name in files],
          }
          Path("latest.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          cat SHA256SUMS.txt
          cat MD5SUMS.txt

      - name: Upload SHA256 checksum artifact
        uses: actions/upload-artifact@v7
        with:
          path: release-assets/SHA256SUMS.txt
          archive: false
          if-no-files-found: error

      - name: Upload MD5 checksum artifact
        uses: actions/upload-artifact@v7
        with:
          path: release-assets/MD5SUMS.txt
          archive: false
          if-no-files-found: error

      - name: Upload latest metadata artifact
        uses: actions/upload-artifact@v7
        with:
          path: release-assets/latest.json
          archive: false
          if-no-files-found: error

  release:
    needs:
      - build-windows
      - build-macos
      - checksums
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            tag="${{ inputs.release_tag }}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "release_tag 不能为空" >&2
            exit 1
          fi
          cat > release-notes.md <<'EOF'
          领克每日任务桌面版发布包。

          下载说明：

          - Windows 用户下载 `LynkcoDaily-*-windows-x64.exe`
          - macOS 用户下载 `LynkcoDaily-*-macos-*.dmg`
          - 便携版下载对应平台的 `.zip`
          - 校验文件：`SHA256SUMS.txt`、`MD5SUMS.txt`
          - 更新元数据：`latest.json`

          本项目仅供学习交流使用，请勿用于商业用途。
          EOF

          shopt -s nullglob
          assets=(
            release-assets/LynkcoDaily-*.exe
            release-assets/LynkcoDaily-*.dmg
            release-assets/LynkcoDaily-*.zip
            release-assets/SHA256SUMS.txt
            release-assets/MD5SUMS.txt
            release-assets/latest.json
          )

          prerelease_args=()
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_args=(--prerelease)
          fi
          if [[ ${#assets[@]} -lt 9 ]]; then
            echo "发布产物不完整：" >&2
            printf '%s\n' "${assets[@]}" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md "${prerelease_args[@]}"
          else
            gh release create "$tag" "${assets[@]}" --target "$GITHUB_SHA" --title "$tag" --notes-file release-notes.md "${prerelease_args[@]}"
          fi
